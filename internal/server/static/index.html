<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIP Test Tool</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
  .app { display: grid; grid-template-columns: 400px 1fr; height: 100vh; }
  .sidebar { background: #1e293b; padding: 1.5rem; overflow-y: auto; border-right: 1px solid #334155; }
  .main { padding: 1.5rem; overflow-y: auto; }

  h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #f8fafc; display: flex; align-items: center; gap: 0.5rem; }
  h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #cbd5e1; }
  h3 { font-size: 0.9rem; color: #94a3b8; margin-bottom: 0.5rem; }

  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.25rem; font-weight: 500; }
  .form-group input, .form-group select { width: 100%; padding: 0.5rem; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 0.875rem; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: #3b82f6; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

  .btn { padding: 0.6rem 1.2rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.875rem; font-weight: 600; transition: background 0.15s; }
  .btn-primary { background: #3b82f6; color: white; width: 100%; }
  .btn-primary:hover { background: #2563eb; }
  .btn-primary:disabled { background: #475569; cursor: not-allowed; }
  .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.75rem; }
  .btn-outline { background: transparent; border: 1px solid #475569; color: #94a3b8; }
  .btn-outline:hover { border-color: #3b82f6; color: #3b82f6; }

  .checkbox { display: flex; align-items: center; gap: 0.5rem; }
  .checkbox input { width: auto; }

  .status-bar { background: #1e293b; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.75rem; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #475569; }
  .status-dot.connected { background: #4ade80; }
  .status-dot.running { background: #fbbf24; animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .status-text { font-size: 0.8rem; color: #94a3b8; }

  .results { display: flex; flex-direction: column; gap: 1rem; }
  .result-card { background: #1e293b; border-radius: 8px; padding: 1.25rem; border-left: 4px solid #475569; }
  .result-card.passed { border-left-color: #4ade80; }
  .result-card.failed { border-left-color: #f87171; }
  .result-card.error { border-left-color: #fbbf24; }
  .result-card.running { border-left-color: #60a5fa; }

  .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .result-name { font-weight: 600; font-size: 1rem; }
  .badge { padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .badge-passed { background: #065f46; color: #4ade80; }
  .badge-failed { background: #7f1d1d; color: #f87171; }
  .badge-error { background: #78350f; color: #fbbf24; }
  .badge-running { background: #1e3a5f; color: #60a5fa; }

  .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
  .metric { background: #0f172a; border-radius: 6px; padding: 0.5rem 0.75rem; }
  .metric .value { font-size: 1rem; font-weight: 600; color: #f8fafc; }
  .metric .label { font-size: 0.7rem; color: #64748b; }

  .sip-flow { margin-top: 0.75rem; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.75rem; }
  .flow-line { padding: 0.15rem 0; display: flex; gap: 0.5rem; }
  .flow-dir { width: 50px; text-align: right; }
  .flow-sent { color: #60a5fa; }
  .flow-recv { color: #4ade80; }
  .flow-ts { color: #475569; }

  .error-box { background: #450a0a; border-radius: 6px; padding: 0.5rem 0.75rem; color: #f87171; font-size: 0.8rem; margin-top: 0.5rem; }

  .log-panel { margin-top: 1rem; background: #1e293b; border-radius: 8px; padding: 1rem; max-height: 200px; overflow-y: auto; }
  .log-entry { font-family: monospace; font-size: 0.75rem; color: #94a3b8; padding: 0.1rem 0; }
  .log-entry.info { color: #60a5fa; }
  .log-entry.success { color: #4ade80; }
  .log-entry.error { color: #f87171; }

  .empty-state { text-align: center; padding: 4rem 2rem; color: #475569; }
  .empty-state p { font-size: 0.9rem; margin-top: 0.5rem; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <h1>SIP Test Tool</h1>

    <div class="status-bar">
      <div class="status-dot" id="ws-status"></div>
      <span class="status-text" id="ws-text">Connecting...</span>
    </div>

    <h2>New Test</h2>
    <form id="test-form">
      <div class="form-group">
        <label>Test Name</label>
        <input type="text" id="test-name" value="Test Call" required>
      </div>
      <div class="form-group">
        <label>Target SIP URI</label>
        <input type="text" id="target" placeholder="sip:1000@192.168.1.50:5060" required>
      </div>
      <div class="form-group">
        <label>From SIP URI (optional)</label>
        <input type="text" id="from" placeholder="sip:tester@auto">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Transport</label>
          <select id="transport">
            <option value="udp">UDP</option>
            <option value="tcp">TCP</option>
          </select>
        </div>
        <div class="form-group">
          <label>Codec</label>
          <select id="codec">
            <option value="PCMU">PCMU (G.711 u-law)</option>
            <option value="PCMA">PCMA (G.711 A-law)</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Duration (seconds)</label>
          <input type="number" id="duration" value="30" min="1" max="3600">
        </div>
        <div class="form-group">
          <label>Max Setup Time (s)</label>
          <input type="number" id="setup-max" value="10" min="1" max="60">
        </div>
      </div>
      <div class="form-group">
        <label>Media File (server path)</label>
        <input type="text" id="media-file" placeholder="/path/to/audio.mp3">
      </div>
      <div class="form-group checkbox">
        <input type="checkbox" id="repeat-media" checked>
        <label for="repeat-media">Repeat media (loop)</label>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Local SIP Port</label>
          <input type="number" id="sip-port" value="5060">
        </div>
        <div class="form-group">
          <label>Local RTP Port (0=auto)</label>
          <input type="number" id="rtp-port" value="0">
        </div>
      </div>
      <button type="submit" class="btn btn-primary" id="run-btn">Run Test</button>
    </form>
  </div>

  <div class="main">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
      <h2>Test Results</h2>
      <button class="btn btn-sm btn-outline" onclick="clearResults()">Clear</button>
    </div>

    <div class="results" id="results">
      <div class="empty-state" id="empty-state">
        <h3>No tests run yet</h3>
        <p>Configure a test on the left and click Run Test to get started.</p>
      </div>
    </div>

    <div class="log-panel" id="log-panel">
      <h3>Event Log</h3>
      <div id="log-entries"></div>
    </div>
  </div>
</div>

<script>
let ws;
let results = [];
let pingInterval;

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('ws-status').className = 'status-dot connected';
    document.getElementById('ws-text').textContent = 'Connected';
    addLog('WebSocket connected', 'success');
    // Send a keepalive message every 25s so the server read deadline never expires
    clearInterval(pingInterval);
    pingInterval = setInterval(() => {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send('ping');
      }
    }, 25000);
  };

  ws.onclose = () => {
    clearInterval(pingInterval);
    document.getElementById('ws-status').className = 'status-dot';
    document.getElementById('ws-text').textContent = 'Disconnected - reconnecting...';
    addLog('WebSocket disconnected', 'error');
    setTimeout(connectWS, 3000);
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'status':
      addLog(`[${msg.data.test_name}] ${msg.data.state}`, 'info');
      updateRunningStatus(msg.data);
      break;
    case 'result':
      addLog(`[${msg.data.test_name}] Completed: ${msg.data.status}`, msg.data.status === 'passed' ? 'success' : 'error');
      addResult(msg.data);
      break;
    case 'suite_complete':
      addLog(`Suite completed: ${msg.data.summary.passed}/${msg.data.summary.total} passed`, 'info');
      break;
  }
}

function addResult(r) {
  // Remove existing card for this test if updating
  const existing = document.getElementById(`result-${CSS.escape(r.test_name)}`);
  if (existing) existing.remove();

  results.unshift(r);
  document.getElementById('empty-state')?.remove();
  const container = document.getElementById('results');

  const card = document.createElement('div');
  card.className = `result-card ${r.status}`;
  card.id = `result-${r.test_name}`;
  card.innerHTML = `
    <div class="result-header">
      <span class="result-name">${esc(r.test_name)}</span>
      <span class="badge badge-${r.status}">${r.status}</span>
    </div>
    <div class="metrics-grid">
      <div class="metric"><div class="value">${r.call_setup_time_ms?.toFixed(0) || '-'}ms</div><div class="label">Setup Time</div></div>
      <div class="metric"><div class="value">${r.call_duration_s?.toFixed(1) || '-'}s</div><div class="label">Duration</div></div>
      <div class="metric"><div class="value">${r.rtp_packets_sent || 0}</div><div class="label">RTP Sent</div></div>
      <div class="metric"><div class="value">${r.rtp_packets_received || 0}</div><div class="label">RTP Received</div></div>
      <div class="metric"><div class="value">${r.packet_loss_pct?.toFixed(2) || '0.00'}%</div><div class="label">Packet Loss</div></div>
      <div class="metric"><div class="value">${esc(r.codec)}</div><div class="label">Codec</div></div>
    </div>
    ${r.error ? `<div class="error-box">${esc(r.error)}</div>` : ''}
    ${r.sip_flow?.length ? `
      <div class="sip-flow">
        <h3>SIP Flow</h3>
        ${r.sip_flow.map(e => `
          <div class="flow-line">
            <span class="flow-dir ${e.direction === 'sent' ? 'flow-sent' : 'flow-recv'}">${e.direction === 'sent' ? '--->' : '<---'}</span>
            <strong>${e.method || e.status}</strong>
            <span class="flow-ts">${e.timestamp?.split('T')[1]?.substring(0,12) || ''}</span>
          </div>
        `).join('')}
      </div>` : ''}
  `;

  container.prepend(card);
}

function updateRunningStatus(status) {
  let card = document.getElementById(`result-${CSS.escape(status.test_name)}`);
  if (!card) {
    document.getElementById('empty-state')?.remove();
    card = document.createElement('div');
    card.className = 'result-card running';
    card.id = `result-${status.test_name}`;
    card.innerHTML = `
      <div class="result-header">
        <span class="result-name">${esc(status.test_name)}</span>
        <span class="badge badge-running">${status.state}</span>
      </div>
    `;
    document.getElementById('results').prepend(card);
  } else if (card.classList.contains('running')) {
    const badge = card.querySelector('.badge');
    if (badge) {
      badge.textContent = status.state;
    }
  }
}

function addLog(text, cls = '') {
  const el = document.getElementById('log-entries');
  const entry = document.createElement('div');
  entry.className = `log-entry ${cls}`;
  const ts = new Date().toLocaleTimeString();
  entry.textContent = `[${ts}] ${text}`;
  el.appendChild(entry);
  el.parentElement.scrollTop = el.parentElement.scrollHeight;
}

function clearResults() {
  results = [];
  const container = document.getElementById('results');
  container.innerHTML = '<div class="empty-state" id="empty-state"><h3>No tests run yet</h3><p>Configure a test on the left and click Run Test to get started.</p></div>';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// Form submission
document.getElementById('test-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = 'Starting...';

  const durationSec = parseInt(document.getElementById('duration').value) || 30;
  const setupMax = parseInt(document.getElementById('setup-max').value) || 10;

  const payload = {
    name: document.getElementById('test-name').value,
    target: document.getElementById('target').value,
    from: document.getElementById('from').value || '',
    transport: document.getElementById('transport').value,
    codec: document.getElementById('codec').value,
    duration: `${durationSec}s`,
    media_file: document.getElementById('media-file').value,
    repeat_media: document.getElementById('repeat-media').checked,
    sip_port: parseInt(document.getElementById('sip-port').value) || 5060,
    rtp_port: parseInt(document.getElementById('rtp-port').value) || 0,
    expected: {
      response_code: 200,
      setup_time_max: `${setupMax}s`,
    },
  };

  try {
    const res = await fetch('/api/tests/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(await res.text());
    addLog(`Test "${payload.name}" submitted`, 'info');
  } catch (err) {
    addLog(`Error: ${err.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Run Test';
  }
});

connectWS();
</script>
</body>
</html>
